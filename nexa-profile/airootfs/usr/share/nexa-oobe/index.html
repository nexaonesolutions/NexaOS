<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem-vindo ao Nexa OS</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            cursor: none;
        }

        .hello-container {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .greeting {
            position: absolute;
            font-weight: 300;
            letter-spacing: -1px;
            opacity: 0;
            text-align: center;
        }

        /* Animação 1: Hello (1 segundo) */
        #g1 {
            font-size: 6rem;
            animation: helloFade 1.2s ease-in-out forwards;
        }

        @keyframes helloFade {
            0% { opacity: 0; transform: scale(0.95); filter: blur(5px); }
            30% { opacity: 1; transform: scale(1); filter: blur(0); }
            80% { opacity: 1; transform: scale(1); filter: blur(0); }
            100% { opacity: 0; transform: scale(1.05); filter: blur(5px); }
        }

        /* Animação 2: Seja Bem Vindo(a) (3 segundos) */
        #g2 {
            font-size: 4rem;
            animation: welcomeFade 3.5s ease-in-out forwards;
            animation-delay: 1.5s; /* Espera o Hello sumir */
        }

        @keyframes welcomeFade {
            0% { opacity: 0; transform: scale(0.95); filter: blur(5px); }
            20% { opacity: 1; transform: scale(1); filter: blur(0); }
            80% { opacity: 1; transform: scale(1); filter: blur(0); }
            100% { opacity: 0; transform: scale(1.05); filter: blur(5px); }
        }

        .username-highlight {
            font-weight: 600;
            background: linear-gradient(90deg, #ffffff, #0088ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Animação 3: Tela Final */
        .final-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: translateY(20px);
            animation: finalFadeIn 2s ease-out forwards;
            animation-delay: 5.5s; /* Entra após o Bem Vindo sumir */
        }

        @keyframes finalFadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-text {
            font-size: 5rem;
            font-weight: 700;
            letter-spacing: -2px;
            margin-bottom: 50px;
            background: linear-gradient(90deg, #ffffff, #a0a0a0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .start-btn {
            padding: 16px 40px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(10px);
        }

        .start-btn:hover {
            background: #ffffff;
            color: #000000;
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255,255,255,0.3);
        }

        .show-cursor {
            cursor: default !important;
        }
    </style>
</head>
<body>

    <div class="hello-container">
        <div class="greeting" id="g1">Hello.</div>
        <div class="greeting" id="g2">Seja Bem Vindo(a) a Nexa OS,<br><span class="username-highlight" id="dynamic-user">Convidado</span>.</div>
    </div>

    <div class="final-screen">
        <div class="logo-text">Nexa OS</div>
        <button class="start-btn" onclick="finishOOBE()">Começar a explorar</button>
    </div>

    <script>
        // Buscar o nome do usuário real da máquina via API
        fetch('http://127.0.0.1:8000/api/user')
            .then(res => res.json())
            .then(data => {
                if(data.username) {
                    document.getElementById('dynamic-user').innerText = data.username;
                }
            })
            .catch(e => console.error("Erro ao buscar usuário", e));

        // Revela o cursor após as animações textuais terminarem (aprox. 5.5s)
        setTimeout(() => {
            document.body.classList.add('show-cursor');
        }, 5500);

        function finishOOBE() {
            document.body.style.transition = 'opacity 0.8s ease';
            document.body.style.opacity = '0';
            
            setTimeout(() => {
                fetch('http://127.0.0.1:8000/api/oobe/close', { method: 'POST' })
                .catch(() => window.close());
            }, 800);
        }
    </script>
</body>
</html>
