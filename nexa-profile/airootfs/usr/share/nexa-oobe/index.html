<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem-vindo ao Nexa OS</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            cursor: none; /* Esconde o cursor durante a animação */
        }

        .hello-container {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .greeting {
            position: absolute;
            font-size: 6rem;
            font-weight: 300;
            letter-spacing: -2px;
            opacity: 0;
            animation: fadeInOut 1s ease-in-out forwards;
        }

        /* Sequência de Animações: Cada saudação dura 1 segundo */
        #g1 { animation-delay: 0s; }
        #g2 { animation-delay: 1s; }
        #g3 { animation-delay: 2s; }
        #g4 { animation-delay: 3s; }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: scale(0.95); filter: blur(5px); }
            30% { opacity: 1; transform: scale(1); filter: blur(0); }
            70% { opacity: 1; transform: scale(1); filter: blur(0); }
            100% { opacity: 0; transform: scale(1.05); filter: blur(5px); }
        }

        .final-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: translateY(20px);
            animation: finalFadeIn 2s ease-out forwards;
            animation-delay: 4.5s; /* Inicia meio segundo após o último Hello sumir */
        }

        @keyframes finalFadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-text {
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ffffff, #a0a0a0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.5rem;
            font-weight: 300;
            color: #888888;
            margin-bottom: 60px;
        }

        .start-btn {
            padding: 16px 40px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(10px);
        }

        .start-btn:hover {
            background: #ffffff;
            color: #000000;
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255,255,255,0.3);
        }

        /* Mostra o cursor apenas na tela final */
        .show-cursor {
            cursor: default !important;
        }
    </style>
</head>
<body>

    <div class="hello-container">
        <div class="greeting" id="g1">Hello</div>
        <div class="greeting" id="g2">Olá</div>
        <div class="greeting" id="g3">Hola</div>
        <div class="greeting" id="g4">Bonjour</div>
    </div>

    <div class="final-screen">
        <div class="logo-text">Nexa OS</div>
        <div class="subtitle">A revolução começa agora.</div>
        <button class="start-btn" onclick="finishOOBE()">Começar a explorar</button>
    </div>

    <script>
        // Revela o cursor do mouse apenas quando o botão "Começar" aparecer (após 4.5s)
        setTimeout(() => {
            document.body.classList.add('show-cursor');
        }, 4500);

        function finishOOBE() {
            // Animação de saída (fade out da tela inteira para o preto)
            document.body.style.transition = 'opacity 0.8s ease';
            document.body.style.opacity = '0';
            
            // Aguarda o fade out e envia o sinal para o servidor matar a janela
            setTimeout(() => {
                fetch('http://127.0.0.1:8000/api/oobe/close', {
                    method: 'POST'
                })
                .then(() => {
                    // Fallback caso a API falhe, tentar fechar via JS Kiosk rules
                    window.close();
                })
                .catch(() => {
                    window.close();
                });
            }, 800);
        }
    </script>
</body>
</html>
