# ==============================================================================
#  NEXA OS - HYPRLAND CONFIGURATION FILE (macOS Killer - Ultra Minimalist)
#  Salvar em: airootfs/etc/skel/.config/hypr/hyprland.conf
# ==============================================================================

# --- Monitores ---
# Configuração dinâmica para qualquer monitor conectado.
monitor=,preferred,auto,1

# --- Programas Padrão ---
$terminal = kitty
$menu = rofi -show drun -show-icons
$fileManager = dolphin

# --- Inicialização Autônoma (Autostart) ---
exec-once = swww init
exec-once = waybar
exec-once = dunst
exec-once = /usr/lib/polkit-kde-authentication-agent-1

# --- Configurações de Input (Teclado e Mouse) ---
input {
    kb_layout = br
    kb_variant = abnt2
    follow_mouse = 1
    sensitivity = 0 # -1.0 a 1.0, 0 significa nenhuma alteração física.
    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}

# --- Layout Geral (Gaps & Bordas) ---
general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
    col.active_border = rgba(0066ccff) rgba(33ccffff) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
    allow_tearing = false
}

# --- Estética e Vidro (Decoração) ---
decoration {
    rounding = 12

    # Efeito Frosted Glass Premium (Desfoque Kawase Otimizado)
    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        xray = false
        noise = 0.01
        contrast = 1.0
        brightness = 1.0
    }

    # Sombras Físicas Suaves para profundidade de campo
    drop_shadow = true
    shadow_range = 20
    shadow_render_power = 3
    col.shadow = rgba(00000040)
    shadow_offset = 0 8
}

# --- Físicas e Animações Bézier ---
animations {
    enabled = true

    # Curva Bézier Customizada: "Overshot" de alta elasticidade e fluidez
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = easeInOut, 0.42, 0, 0.58, 1

    # Configuração de transição física
    animation = windows, 1, 6, overshot, slide
    animation = windowsOut, 1, 6, smoothOut, slide
    animation = windowsMove, 1, 5, easeInOut, slide
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 5, overshot, slide
}

# --- Comportamento de Janelas (Dwindle) ---
dwindle {
    pseudotile = true
    preserve_split = true
}

# --- Gestos Touchpad ---
gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
}

# --- Regras de Janela (Window Rules) ---
# Forçar opacidade para terminal Kitty e Rofi para efeito Glassmorphism
windowrulev2 = opacity 0.85 0.85, class:^(kitty)$
windowrulev2 = opacity 0.90 0.90, class:^(rofi)$
windowrulev2 = float, class:^(calamares)$

# Regras para o Modo Jogo (Firefox Kiosk)
windowrulev2 = noborder, title:^(Nexa Game Mode)$
windowrulev2 = noshadow, title:^(Nexa Game Mode)$
windowrulev2 = fullscreen, title:^(Nexa Game Mode)$

# --- Atalhos de Teclado (Keybindings) ---
$mainMod = SUPER

bind = $mainMod, G, exec, firefox --kiosk --class="Nexa Game Mode" -T "Nexa Game Mode" http://127.0.0.1:8000/game-mode
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, SPACE, exec, rofi -show drun -theme nexa-spotlight
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle

# Mover foco com teclas de seta (estilo vim)
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Mudar workspaces de 1-10
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Mover janela ativa para workspace específico
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Redimensionar e mover janelas com mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
