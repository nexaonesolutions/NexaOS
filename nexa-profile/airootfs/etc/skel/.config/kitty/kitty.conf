# ==============================================================================
#  NEXA OS - KITTY TERMINAL CONFIGURATION
#  Salvar em: airootfs/etc/skel/.config/kitty/kitty.conf
# ==============================================================================

# Fontes Modernas e Limpas
font_family      FiraCode Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# Decoração da Janela
draw_minimal_borders yes
window_padding_width 10
hide_window_decorations yes

# Efeito Translúcido (Glassmorphism)
# A opacidade será combinada com o blur do Hyprland
background_opacity 0.82

# Esquema de Cores (Minimalist Dark - Estilo Vercel/Stripe)
background            #0a0a0a
foreground            #ededed
selection_background  #333333
selection_foreground  #ffffff

# Cores de Cursor
cursor                #0066cc
cursor_text_color     #000000
cursor_shape          beam

# Cores da Paleta ANSI
# Black
color0  #1a1a1a
color8  #5a5a5a
# Red
color1  #ff453a
color9  #ff453a
# Green
color2  #32d74b
color10 #32d74b
# Yellow
color3  #ffd60a
color11 #ffd60a
# Blue
color4  #0a84ff
color12 #0a84ff
# Magenta
color5  #bf5af2
color13 #bf5af2
# Cyan
color6  #5ac8fa
color14 #5ac8fa
# White
color7  #ffffff
color15 #ffffff
