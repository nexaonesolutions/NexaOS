# ==============================================================================
#  NEXA OS - CALAMARES SETTINGS CONFIGURATION
#  Salvar em: airootfs/etc/calamares/settings.conf
# ==============================================================================

---
# Módulo de branding ativo
branding: nexa

# Exibir botão de instalação antes de confirmar
prompt-install: true

# Modo de depuração (false em produção)
debug: false

# Sequência de etapas do instalador
sequence:
    - show:
        - welcome
        - locale
        - keyboard
        - partition
        - users
        - summary
    - exec:
        - partition
        - mount
        - unpackfs
        - machineid
        - fstab
        - locale
        - keyboard
        - localecfg
        - initcpio
        - users
        - displaymanager
        - networkcfg
        - hwclock
        - services-systemd
        - packages
        - grubcfg
        - bootloader
        - shellprocess
        - umount
    - show:
        - finished

# Módulos a ignorar caso não existam (não aborta o build)
modules-search: [ local, /usr/lib/calamares/modules ]
